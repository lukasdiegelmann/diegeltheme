# ~/.config/alacritty/alacritty.toml
[window]
padding = { x = 0, y = 0 }
dynamic_padding = false
decorations = "None"
opacity = 1.0

[font]
size = 11.5

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[colors.primary]
background = "#000000"
foreground = "#EAEAEA"
dim_foreground = "#9A9A9A"
bright_foreground = "#FFFFFF"

[colors.cursor]
text = "#000000"
cursor = "#d91e36"

[colors.vi_mode_cursor]
text = "#000000"
cursor = "#d91e36"

[colors.selection]
text = "#000000"
background = "#d91e36"

[colors.search.matches]
foreground = "#000000"
background = "#FFD84D"

[colors.search.focused_match]
foreground = "#000000"
background = "#7CFF6B"

[colors.hints.start]
foreground = "#000000"
background = "#66B3FF"

[colors.hints.end]
foreground = "#000000"
background = "#C792FF"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.footer_bar]
foreground = "#EAEAEA"
background = "#111111"

[colors.normal]
black   = "#0A0A0A"
red     = "#d91e36"
green   = "#7CFF6B"
yellow  = "#FFD84D"
blue    = "#66B3FF"
magenta = "#C792FF"
cyan    = "#5CE1E6"
white   = "#D9D9D9"

[colors.bright]
black   = "#2A2A2A"
red     = "#ff2a47"
green   = "#A8FF9A"
yellow  = "#FFE88A"
blue    = "#8CC8FF"
magenta = "#D8B4FF"
cyan    = "#8EF0F2"
white   = "#FFFFFF"

[colors.dim]
black   = "#050505"
red     = "#8b0000"
green   = "#4D8F44"
yellow  = "#A68E2F"
blue    = "#3D6E99"
magenta = "#7B5C99"
cyan    = "#3E8C91"
white   = "#A8A8A8"

[cursor]
style = { shape = "Block", blinking = "Off" }
unfocused_hollow = true

[scrolling]
history = 8000
multiplier = 3

[mouse]
hide_when_typing = true

[env]
TERM = "xterm-256color"
